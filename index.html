<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizMaker – Crea y Comparte Quizzes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --surface: #13162b;
      --surface2: #1a1e38;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --success: #22d3a5;
      --error: #f87171;
      --warning: #fbbf24;
      --text: #e8eaf6;
      --muted: #9094b8;
      --border: #2a2e55;
      --radius: 14px;
      --transition: .2s ease;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ---------- Header ---------- */
    header {
      background: linear-gradient(135deg, #1a1e38 0%, #0d0f1a 100%);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo span { font-weight: 300; }

    /* ---------- Layout ---------- */
    .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ---------- Tabs ---------- */
    .tabs { display: flex; gap: .5rem; margin-bottom: 2rem; background: var(--surface); border-radius: 12px; padding: .4rem; width: fit-content; }
    .tab-btn {
      padding: .55rem 1.4rem; border-radius: 9px; border: none; cursor: pointer;
      font-family: inherit; font-size: .9rem; font-weight: 600;
      color: var(--muted); background: transparent;
      transition: var(--transition);
    }
    .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 0 18px rgba(108,99,255,.35); }

    /* ---------- Cards ---------- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.2rem;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .card-title { font-weight: 700; font-size: 1rem; color: var(--accent2); }

    /* ---------- Form elements ---------- */
    label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .35rem; font-weight: 500; }
    input[type="text"], textarea, select {
      width: 100%; padding: .7rem 1rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-family: inherit; font-size: .9rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none; resize: vertical;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.18);
    }
    textarea { min-height: 70px; }
    select { cursor: pointer; }

    /* ---------- Option rows ---------- */
    .options-list { display: flex; flex-direction: column; gap: .6rem; margin-top: .8rem; }
    .option-row { display: flex; align-items: center; gap: .6rem; }
    .option-row input[type="text"] { flex: 1; }
    .correct-check {
      width: 22px; height: 22px; flex-shrink: 0; cursor: pointer;
      accent-color: var(--success); transform: scale(1.2);
    }
    .option-letter {
      width: 28px; height: 28px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: var(--muted); flex-shrink: 0;
    }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .65rem 1.4rem; border-radius: 9px; border: none;
      font-family: inherit; font-size: .875rem; font-weight: 600;
      cursor: pointer; transition: var(--transition); text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; box-shadow: 0 4px 18px rgba(108,99,255,.35); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(108,99,255,.5); }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }
    .btn-danger { background: rgba(248,113,113,.12); color: var(--error); border: 1px solid rgba(248,113,113,.25); }
    .btn-danger:hover { background: rgba(248,113,113,.2); }
    .btn-success { background: linear-gradient(135deg, #059669, var(--success)); color: #fff; box-shadow: 0 4px 18px rgba(34,211,165,.3); }
    .btn-success:hover { transform: translateY(-2px); }
    .btn-sm { padding: .35rem .85rem; font-size: .8rem; }

    /* ---------- Link card ---------- */
    .link-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem 1.4rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .link-url {
      flex: 1; font-size: .8rem; color: var(--accent2);
      word-break: break-all; font-family: monospace;
    }

    /* ---------- Quiz Player ---------- */
    .quiz-header {
      text-align: center; margin-bottom: 2rem;
    }
    .quiz-title {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: .4rem;
    }
    .quiz-meta { color: var(--muted); font-size: .9rem; }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem 1.6rem;
      margin-bottom: 1.2rem; transition: border-color var(--transition);
    }
    .question-card.answered-correct { border-color: var(--success); background: rgba(34,211,165,.04); }
    .question-card.answered-wrong { border-color: var(--error); background: rgba(248,113,113,.04); }

    .q-number { font-size: .78rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
    .q-text { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .q-type-badge {
      display: inline-block; font-size: .7rem; font-weight: 700;
      padding: .15rem .5rem; border-radius: 4px; margin-bottom: .8rem;
      background: rgba(108,99,255,.2); color: var(--accent2); text-transform: uppercase; letter-spacing: .04em;
    }

    .options-grid { display: flex; flex-direction: column; gap: .55rem; }
    .opt-item {
      display: flex; align-items: center; gap: .8rem;
      padding: .75rem 1rem; border-radius: 10px;
      border: 1.5px solid var(--border); cursor: pointer;
      background: var(--surface2); transition: var(--transition);
      user-select: none;
    }
    .opt-item:hover:not(.disabled) { border-color: var(--accent); background: rgba(108,99,255,.08); }
    .opt-item.selected:not(.revealed) { border-color: var(--accent); background: rgba(108,99,255,.15); }
    .opt-item.correct-ans { border-color: var(--success); background: rgba(34,211,165,.1); }
    .opt-item.wrong-ans { border-color: var(--error); background: rgba(248,113,113,.1); }
    .opt-item.disabled { cursor: default; }

    .opt-letter {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem;
      background: var(--surface); border: 1.5px solid var(--border);
      transition: var(--transition);
    }
    .opt-item.selected:not(.revealed) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-item.correct-ans .opt-letter { background: var(--success); border-color: var(--success); color: #fff; }
    .opt-item.wrong-ans .opt-letter { background: var(--error); border-color: var(--error); color: #fff; }

    .opt-text { flex: 1; font-size: .9rem; }
    .opt-icon { font-size: 1.1rem; margin-left: auto; }

    /* ---------- Submit / Result ---------- */
    .submit-section { text-align: center; padding: 1.2rem 0; }
    .result-banner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem;
      text-align: center; margin-top: 1.5rem;
    }
    .score-ring {
      width: 120px; height: 120px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
      border: 5px solid var(--accent);
      box-shadow: 0 0 30px rgba(108,99,255,.4);
    }
    .score-num { font-size: 2rem; font-weight: 800; color: var(--accent2); }
    .score-den { font-size: .85rem; color: var(--muted); }
    .result-label { font-size: 1.4rem; font-weight: 700; margin-bottom: .4rem; }
    .result-pct { font-size: 1rem; color: var(--muted); }

    /* ---------- Badge / Notice ---------- */
    .notice {
      background: rgba(108,99,255,.1); border: 1px solid rgba(108,99,255,.3);
      border-radius: 10px; padding: .85rem 1.1rem; font-size: .85rem;
      color: var(--accent2); margin-bottom: 1.2rem;
    }
    .notice-warn {
      background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.3);
      border-radius: 10px; padding: .85rem 1.1rem; font-size: .85rem;
      color: var(--warning); margin-bottom: 1.2rem;
    }

    /* ---------- Redactor ---------- */
    .redactor-area {
      width: 100%; min-height: 320px; font-family: 'Courier New', monospace;
      font-size: .85rem; line-height: 1.7; padding: 1rem;
      background: #0a0c18; border: 1.5px solid var(--border);
      border-radius: var(--radius); color: #c5c8e0;
      resize: vertical; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .redactor-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.18); }
    .redactor-area::placeholder { color: #3a3e5c; }
    .privacy-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(34,211,165,.08); border: 1px solid rgba(34,211,165,.25);
      border-radius: 8px; padding: .4rem .9rem; font-size: .78rem;
      color: var(--success); font-weight: 600;
    }
    .parsed-preview {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.2rem;
      margin-top: 1rem; font-size: .85rem;
    }
    .parsed-q { margin-bottom: .7rem; color: var(--text); }
    .parsed-q strong { color: var(--accent2); }
    .parsed-opt { padding-left: 1rem; color: var(--muted); }
    .parsed-opt.correct { color: var(--success); font-weight: 600; }

    /* ---------- Helpers ---------- */
    .flex { display: flex; }
    .gap-1 { gap: .5rem; }
    .mt-1 { margin-top: .5rem; }
    .mt-2 { margin-top: 1rem; }
    .hidden { display: none !important; }

    /* ---------- Toast ---------- */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: .8rem 1.2rem;
      font-size: .85rem; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      transform: translateY(80px); opacity: 0;
      transition: .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 9999; display: flex; align-items: center; gap: .6rem;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ---------- Animations ---------- */
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn .35s ease forwards; }

    /* ---------- Responsive ---------- */
    @media(max-width:600px) {
      .link-box { flex-direction: column; align-items: stretch; }
      .quiz-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Quiz<span>Maker</span></div>
  <span style="color:var(--muted);font-size:.85rem">Crea y comparte quizzes fácilmente</span>
</header>

<div class="container" id="app"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════════
const LETTERS = ['A','B','C','D','E','F','G','H'];

function encodeQuiz(quiz) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(quiz))));
}

function decodeQuiz(str) {
  try { return JSON.parse(decodeURIComponent(escape(atob(str)))); }
  catch(e) { return null; }
}

function getHash() {
  return location.hash.slice(1);
}

function showToast(msg, icon = '✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `${icon} ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function shareURL(code) {
  return `${location.origin}${location.pathname}#${code}`;
}

async function shortenUrl(longUrl, btnElement) {
  const originalText = btnElement.innerHTML;
  btnElement.innerHTML = '⏳ Acortando...';
  btnElement.disabled = true;

  try {
    const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`);
    const data = await res.json();
    if (data.shorturl) {
      navigator.clipboard.writeText(data.shorturl).then(() => {
        showToast('¡Enlace corto copiado!', '🔗');
        btnElement.innerHTML = '✅ Copiado: ' + data.shorturl.replace('https://','');
      });
    } else {
      throw new Error(data.errormessage || 'Error al acortar');
    }
  } catch (err) {
    console.error(err);
    showToast('Error al acortar URL. Usa el enlace normal.', '❌');
    btnElement.innerHTML = originalText;
    btnElement.disabled = false;
  }
}

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let questions = [];   // for creator
let quizMeta = { title: '', description: '' };

// ════════════════════════════════════════════════════════════
//  CREATOR
// ════════════════════════════════════════════════════════════
function newQuestion() {
  return {
    id: Date.now() + Math.random(),
    text: '',
    type: 'single',   // 'single' | 'multi'
    options: [
      { text: '', correct: false },
      { text: '', correct: false },
      { text: '', correct: false },
      { text: '', correct: false },
    ]
  };
}

function renderCreator() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // --- Meta form ---
  const metaCard = document.createElement('div');
  metaCard.className = 'card fade-in';
  metaCard.innerHTML = `
    <div class="card-header"><span class="card-title">📋 Información del Quiz</span></div>
    <label>Título del Quiz</label>
    <input type="text" id="quizTitle" placeholder="Ej. Leishmaniasis en Guatemala" value="${quizMeta.title}"/>
    <div style="height:.8rem"></div>
    <label>Descripción (opcional)</label>
    <textarea id="quizDesc" placeholder="Breve descripción del quiz...">${quizMeta.description}</textarea>
  `;
  app.appendChild(metaCard);

  // --- Questions ---
  questions.forEach((q, qi) => renderQuestionEditor(app, q, qi));

  // --- Add question button ---
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-ghost mt-2';
  addBtn.innerHTML = '＋ Agregar Pregunta';
  addBtn.onclick = () => {
    saveMeta();
    questions.push(newQuestion());
    renderCreator();
    setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
  };
  app.appendChild(addBtn);

  // --- Generate button ---
  const genBtn = document.createElement('button');
  genBtn.className = 'btn btn-primary mt-2';
  genBtn.style.marginLeft = '.5rem';
  genBtn.innerHTML = '🔗 Generar Enlace del Quiz';
  genBtn.onclick = generateLink;
  app.appendChild(genBtn);

  // --- Link output area ---
  const linkArea = document.createElement('div');
  linkArea.id = 'linkArea';
  linkArea.className = 'hidden mt-2';
  app.appendChild(linkArea);
}

function renderQuestionEditor(container, q, qi) {
  const card = document.createElement('div');
  card.className = 'card fade-in';
  card.dataset.qid = q.id;

  const typeLabel = q.type === 'multi' ? '☑ Múltiple' : '⬤ Única';
  const hint = q.type === 'multi'
    ? '<span style="color:var(--warning);font-size:.78rem">☑ Marca todas las respuestas correctas</span>'
    : '<span style="color:var(--muted);font-size:.78rem">⬤ Marca UNA respuesta correcta</span>';

  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">Pregunta ${qi + 1}</span>
      <div class="flex gap-1">
        <select class="btn btn-ghost btn-sm" style="padding:.3rem .7rem;font-size:.8rem" onchange="changeType('${q.id}', this.value)">
          <option value="single" ${q.type==='single'?'selected':''}>Respuesta Única</option>
          <option value="multi" ${q.type==='multi'?'selected':''}>Multi-respuesta</option>
        </select>
        <button class="btn btn-danger btn-sm" onclick="removeQuestion('${q.id}')">✕ Eliminar</button>
      </div>
    </div>
    ${hint}
    <div style="height:.5rem"></div>
    <label>Texto de la pregunta</label>
    <textarea placeholder="Escribe la pregunta aquí..." oninput="updateQText('${q.id}',this.value)">${q.text}</textarea>
    <div class="options-list" id="opts-${q.id}">
      ${q.options.map((opt, oi) => renderOptionRow(q, opt, oi)).join('')}
    </div>
    <button class="btn btn-ghost btn-sm mt-2" onclick="addOption('${q.id}')">＋ Opción</button>
  `;
  container.appendChild(card);
}

function renderOptionRow(q, opt, oi) {
  const isMulti = q.type === 'multi';
  const checkType = isMulti ? 'checkbox' : 'radio';
  return `
    <div class="option-row" id="row-${q.id}-${oi}">
      <div class="option-letter">${LETTERS[oi]}</div>
      <input type="text" placeholder="Texto de opción ${LETTERS[oi]}"
        value="${opt.text.replace(/"/g,'&quot;')}"
        oninput="updateOptText('${q.id}',${oi},this.value)" />
      <input type="${checkType}"
        class="correct-check"
        title="¿Es correcta?"
        ${opt.correct ? 'checked' : ''}
        onchange="toggleCorrect('${q.id}',${oi},this.checked)"
        name="correct-${q.id}" />
      <button class="btn btn-danger btn-sm" onclick="removeOption('${q.id}',${oi})">✕</button>
    </div>`;
}

// --- Creator actions ---
function saveMeta() {
  const t = document.getElementById('quizTitle');
  const d = document.getElementById('quizDesc');
  if (t) quizMeta.title = t.value;
  if (d) quizMeta.description = d.value;
}

function updateQText(id, val) {
  const q = questions.find(x => String(x.id) === String(id));
  if (q) q.text = val;
}

function updateOptText(qid, oi, val) {
  const q = questions.find(x => String(x.id) === String(qid));
  if (q) q.options[oi].text = val;
}

function toggleCorrect(qid, oi, checked) {
  const q = questions.find(x => String(x.id) === String(qid));
  if (!q) return;
  if (q.type === 'single') {
    q.options.forEach(o => o.correct = false);
  }
  q.options[oi].correct = checked;
}

function changeType(qid, val) {
  saveMeta();
  const q = questions.find(x => String(x.id) === String(qid));
  if (q) { q.type = val; q.options.forEach(o => o.correct = false); }
  renderCreator();
}

function removeQuestion(qid) {
  saveMeta();
  questions = questions.filter(x => String(x.id) !== String(qid));
  renderCreator();
}

function addOption(qid) {
  saveMeta();
  const q = questions.find(x => String(x.id) === String(qid));
  if (q && q.options.length < 8) q.options.push({ text: '', correct: false });
  renderCreator();
}

function removeOption(qid, oi) {
  saveMeta();
  const q = questions.find(x => String(x.id) === String(qid));
  if (q && q.options.length > 2) q.options.splice(oi, 1);
  renderCreator();
}

function generateLink() {
  saveMeta();

  // Validate
  if (!quizMeta.title.trim()) { showToast('Ingresa un título para el quiz.', '⚠️'); return; }
  if (questions.length === 0) { showToast('Agrega al menos una pregunta.', '⚠️'); return; }

  let valid = true;
  for (const q of questions) {
    if (!q.text.trim()) { showToast('Hay una pregunta sin texto.', '⚠️'); valid = false; break; }
    const filled = q.options.filter(o => o.text.trim());
    if (filled.length < 2) { showToast('Cada pregunta necesita al menos 2 opciones con texto.', '⚠️'); valid = false; break; }
    const hasCorrect = q.options.some(o => o.correct && o.text.trim());
    if (!hasCorrect) { showToast(`La pregunta "${q.text.substring(0,30)}…" no tiene respuesta correcta marcada.`, '⚠️'); valid = false; break; }
  }
  if (!valid) return;

  // Build clean data (strip empty options)
  const data = {
    title: quizMeta.title.trim(),
    description: quizMeta.description.trim(),
    questions: questions.map(q => ({
      text: q.text.trim(),
      type: q.type,
      options: q.options.filter(o => o.text.trim()).map(o => ({ text: o.text.trim(), correct: o.correct }))
    }))
  };

  const code = encodeQuiz(data);
  const url = shareURL(code);
  location.hash = code;

  const linkArea = document.getElementById('linkArea');
  linkArea.className = 'fade-in mt-2';
  linkArea.innerHTML = `
    <div class="notice">🎉 ¡Quiz generado! Copia el enlace y compártelo.</div>
    <div class="link-box">
      <span class="link-url" id="generatedURL">${url}</span>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-success btn-sm" onclick="copyURL()">📋 URL Larga</button>
        <button class="btn btn-primary btn-sm" style="background:var(--accent2);color:#000" onclick="shortenUrl(document.getElementById('generatedURL').textContent, this)">✨ Enlace Corto</button>
        <button class="btn btn-ghost btn-sm" onclick="previewQuiz('${code}')">👁 Prever</button>
      </div>
    </div>`;
}

function copyURL() {
  const url = document.getElementById('generatedURL').textContent;
  navigator.clipboard.writeText(url).then(() => showToast('¡Enlace copiado!', '📋'));

let playerState = {};  // { qIndex: {selected: Set, revealed: bool} }

function renderPlayer(quiz) {
  playerState = {};
  quiz.questions.forEach((_, i) => {
    playerState[i] = { selected: new Set(), revealed: false };
  });

  const app = document.getElementById('app');
  app.innerHTML = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'quiz-header fade-in';
  hdr.innerHTML = `
    <h1 class="quiz-title">${quiz.title}</h1>
    ${quiz.description ? `<p class="quiz-meta">${quiz.description}</p>` : ''}
    <p class="quiz-meta" style="margin-top:.4rem">${quiz.questions.length} pregunta${quiz.questions.length !== 1 ? 's' : ''}</p>
    <button class="btn btn-ghost btn-sm" style="margin-top:1rem" onclick="backToCreator()">← Volver al editor</button>
  `;
  app.appendChild(hdr);

  // Questions
  quiz.questions.forEach((q, qi) => renderPlayerQuestion(app, quiz, q, qi));

  // Submit
  const sub = document.createElement('div');
  sub.className = 'submit-section fade-in';
  sub.innerHTML = `<button class="btn btn-primary" onclick="submitQuiz()" id="submitBtn">✅ Ver resultados</button>`;
  app.appendChild(sub);

  // Result placeholder
  const res = document.createElement('div');
  res.id = 'resultArea';
  app.appendChild(res);

  // Store quiz for submit
  window.__currentQuiz = quiz;
}

function renderPlayerQuestion(container, quiz, q, qi) {
  const wrapper = document.createElement('div');
  wrapper.className = 'question-card fade-in';
  wrapper.id = `qcard-${qi}`;

  const typeLabel = q.type === 'multi' ? 'Múltiple respuesta' : 'Respuesta única';
  const hint = q.type === 'multi' ? ' (selecciona todas las correctas)' : ' (selecciona una respuesta)';

  wrapper.innerHTML = `
    <div class="q-number">Pregunta ${qi + 1} de ${quiz.questions.length}</div>
    <div class="q-type-badge">${typeLabel}</div>
    <div class="q-text">${q.text}${hint}</div>
    <div class="options-grid" id="opts-player-${qi}">
      ${q.options.map((opt, oi) => `
        <div class="opt-item" id="opt-${qi}-${oi}" onclick="selectOption(${qi},${oi})">
          <div class="opt-letter">${LETTERS[oi]}</div>
          <div class="opt-text">${opt.text}</div>
          <div class="opt-icon" id="icon-${qi}-${oi}"></div>
        </div>
      `).join('')}
    </div>
  `;
  container.appendChild(wrapper);
}

function selectOption(qi, oi) {
  const state = playerState[qi];
  if (state.revealed) return;

  const q = window.__currentQuiz.questions[qi];

  if (q.type === 'single') {
    // Deselect all then select
    state.selected.clear();
    state.selected.add(oi);
    q.options.forEach((_, i) => {
      document.getElementById(`opt-${qi}-${i}`)?.classList.remove('selected');
    });
  } else {
    // Toggle
    if (state.selected.has(oi)) state.selected.delete(oi);
    else state.selected.add(oi);
  }
  const el = document.getElementById(`opt-${qi}-${oi}`);
  if (state.selected.has(oi)) el.classList.add('selected');
  else el.classList.remove('selected');
}

function revealQuestion(quiz, qi, score) {
  const q = quiz.questions[qi];
  const state = playerState[qi];
  state.revealed = true;

  const correctIndices = new Set(q.options.map((o,i) => o.correct ? i : -1).filter(i => i !== -1));
  const selectedCorrect = [...state.selected].every(i => correctIndices.has(i)) && state.selected.size === correctIndices.size;

  const card = document.getElementById(`qcard-${qi}`);
  card.classList.add(selectedCorrect ? 'answered-correct' : 'answered-wrong');

  q.options.forEach((opt, oi) => {
    const el = document.getElementById(`opt-${qi}-${oi}`);
    const icon = document.getElementById(`icon-${qi}-${oi}`);
    el.classList.add('disabled');
    el.classList.remove('selected');

    if (opt.correct) {
      el.classList.add('correct-ans');
      icon.textContent = '✅';
    } else if (state.selected.has(oi)) {
      el.classList.add('wrong-ans');
      icon.textContent = '❌';
    }
  });

  return selectedCorrect ? 1 : 0;
}

function submitQuiz() {
  const quiz = window.__currentQuiz;
  let score = 0;
  quiz.questions.forEach((q, qi) => {
    score += revealQuestion(quiz, qi, score);
  });

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = '✓ Resultados revelados';

  const pct = Math.round((score / quiz.questions.length) * 100);
  let emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '📚';
  let msg = pct === 100 ? '¡Perfecto!' : pct >= 70 ? '¡Muy bien!' : pct >= 50 ? 'Buen intento' : 'Sigue practicando';

  const resultArea = document.getElementById('resultArea');
  resultArea.innerHTML = `
    <div class="result-banner fade-in">
      <div class="score-ring">
        <div class="score-num">${score}</div>
        <div class="score-den">de ${quiz.questions.length}</div>
      </div>
      <div class="result-label">${emoji} ${msg}</div>
      <div class="result-pct">${pct}% de respuestas correctas</div>
      <button class="btn btn-primary mt-2" onclick="restartQuiz()">🔄 Intentar de nuevo</button>
    </div>`;
  resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
  renderPlayer(window.__currentQuiz);
}

function backToCreator() {
  location.hash = '';
  initApp();
}

// ─── Smart parser ───────────────────────────────────────────
function parseQuizText(raw) {
  const lines = raw.split(/\r?\n/);
  const parsed = { questions: [], answers: {} };

  // ── 1. Detect where the "answers" section starts ──
  const ANSWER_HEADERS = /^(respuestas?\s*(correctas?)?|clave|answer key|answers)[:\s]*/i;
  let answerSectionIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (ANSWER_HEADERS.test(lines[i].trim())) { answerSectionIdx = i; break; }
  }

  // Parse answer lines like: "1 c", "1. c", "1) C", "1 - C"
  if (answerSectionIdx !== -1) {
    for (let i = answerSectionIdx + 1; i < lines.length; i++) {
      const m = lines[i].trim().match(/^(\d+)[.\)\-\s]+([a-hA-H])/);
      if (m) parsed.answers[parseInt(m[1])] = m[2].toUpperCase();
    }
  }

  // ── 2. Parse questions from the rest ──
  const contentLines = answerSectionIdx !== -1 ? lines.slice(0, answerSectionIdx) : lines;
  const OPTION_RE = /^\s*[\*\-\.•]?\s*([A-H])[.\)\-\s]+(.+)$/i;
  const QUESTION_NUM_RE = /^(\d+)[.\)\-]\s+(.*)$/; // "1. Título" or "1) text"

  let currentQ = null;

  function pushQ() {
    if (currentQ && currentQ.text.trim() && currentQ.options.length >= 2) {
      parsed.questions.push(currentQ);
    }
  }

  for (let i = 0; i < contentLines.length; i++) {
    const line = contentLines[i];
    const trimmed = line.trim();
    if (!trimmed) continue;

    const optMatch = trimmed.match(OPTION_RE);
    if (optMatch && currentQ) {
      // This is an A/B/C/D option
      currentQ.options.push({ letter: optMatch[1].toUpperCase(), text: optMatch[2].trim(), correct: false });
      continue;
    }

    const numMatch = trimmed.match(QUESTION_NUM_RE);
    if (numMatch) {
      // Could be "1. Section Title" followed by the actual question on next line
      // Look ahead: if next non-empty line is also NOT an option → it's the question text after a title
      const sectionTitle = numMatch[2].trim();
      // Peek at next lines to find actual question text
      let questionText = '';
      let j = i + 1;
      while (j < contentLines.length && !contentLines[j].trim()) j++; // skip blanks
      const nextTrimmed = j < contentLines.length ? contentLines[j].trim() : '';
      const nextIsOption = OPTION_RE.test(nextTrimmed);
      const nextIsNum = QUESTION_NUM_RE.test(nextTrimmed);

      if (!nextIsOption && !nextIsNum && nextTrimmed) {
        // Next line is the real question text
        questionText = nextTrimmed;
        i = j; // consume it
      } else {
        // The section title line IS the question text
        questionText = sectionTitle;
      }

      pushQ();
      currentQ = {
        num: parseInt(numMatch[1]),
        text: questionText,
        type: 'single',
        options: []
      };
      continue;
    }

    // Plain text line: if we have a currentQ without text, or this is the question
    if (currentQ && currentQ.text && !optMatch) {
      // Could be continuation of question text
      currentQ.text += ' ' + trimmed;
    } else if (!currentQ && trimmed) {
      // Standalone question before any numbering?
      pushQ();
      currentQ = { num: parsed.questions.length + 1, text: trimmed, type: 'single', options: [] };
    }
  }
  pushQ();

  // ── 3. Apply correct answers ──
  parsed.questions.forEach((q, idx) => {
    const num = q.num || (idx + 1);
    const correctLetter = parsed.answers[num];
    q.options.forEach(o => {
      o.correct = correctLetter ? o.letter === correctLetter : false;
    });
  });

  return parsed.questions;
}

function parseAndGenerate() {
  const rdTitle = document.getElementById('rdTitle');
  const rdDesc  = document.getElementById('rdDesc');
  const rdText  = document.getElementById('rdText');
  const feedback = document.getElementById('rdFeedback');
  const linkArea = document.getElementById('rdLinkArea');

  const title = rdTitle ? rdTitle.value.trim() : '';
  const desc  = rdDesc  ? rdDesc.value.trim()  : '';
  const raw   = rdText  ? rdText.value.trim()  : '';

  if (!title) { showToast('Ingresa el título del quiz.', '⚠️'); rdTitle && rdTitle.focus(); return; }
  if (!raw)   { showToast('Pega el contenido del quiz primero.', '⚠️'); return; }

  const qs = parseQuizText(raw);

  if (qs.length === 0) {
    feedback.innerHTML = `<div class="notice-warn">⚠️ No se detectaron preguntas. Revisa el formato.</div>`;
    linkArea.className = 'hidden';
    return;
  }

  const noAnswer = qs.filter(q => !q.options.some(o => o.correct));
  let warnHtml = '';
  if (noAnswer.length > 0) {
    warnHtml = `<div class="notice-warn" style="margin-bottom:.5rem">⚠️ ${noAnswer.length} pregunta(s) sin respuesta marcada. Verifica la sección "respuestas correctas".</div>`;
  }

  // Preview
  const previewHtml = qs.map((q, i) => `
    <div class="parsed-q">
      <strong>${i+1}. ${q.text.substring(0,80)}${q.text.length>80?'…':''}</strong>
      ${q.options.map(o => `<div class="parsed-opt ${o.correct?'correct':''}">${o.correct?'✅':' ○'} ${o.letter}. ${o.text}</div>`).join('')}
    </div>
  `).join('<hr style="border-color:var(--border);margin:.4rem 0">');

  feedback.innerHTML = `
    ${warnHtml}
    <div class="notice">✅ Se detectaron <strong>${qs.length}</strong> pregunta(s). Vista previa:</div>
    <div class="parsed-preview">${previewHtml}</div>
  `;

  // Build data
  const data = {
    title,
    description: desc,
    questions: qs.map(q => ({
      text: q.text,
      type: q.type,
      options: q.options.map(o => ({ text: o.text, correct: o.correct }))
    }))
  };

  const code = encodeQuiz(data);
  const url  = shareURL(code);
  location.hash = code;

  linkArea.className = 'fade-in mt-2';
  linkArea.innerHTML = `
    <div class="notice">🎉 ¡Enlace generado! Cópialo y compártelo.</div>
    <div class="link-box">
      <span class="link-url" id="rdGeneratedURL">${url}</span>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-success btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('rdGeneratedURL').textContent).then(()=>showToast('¡Enlace copiado!','📋'))">📋 URL Larga</button>
        <button class="btn btn-primary btn-sm" style="background:var(--accent2);color:#000" onclick="shortenUrl(document.getElementById('rdGeneratedURL').textContent, this)">✨ Enlace Corto</button>
        <button class="btn btn-ghost btn-sm" onclick="renderPlayer(decodeQuiz(getHash()))">👁 Prever</button>
      </div>
    </div>`;

  linkArea.scrollIntoView({ behavior: 'smooth' });
}

function initApp() {

    const quiz = decodeQuiz(hash);
    if (quiz) { renderPlayer(quiz); return; }
  }

  const app = document.getElementById('app');

      <button class="tab-btn" id="tabRedactor" onclick="switchTab('redactor')">📝 Modo Redactor</button>
    </div>
    <div id="tabContent"></div>
  `;

  if (questions.length === 0) questions.push(newQuestion());
  renderCreatorInto(document.getElementById('tabContent'));
}
